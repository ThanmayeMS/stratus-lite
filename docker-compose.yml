services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stratus_lite
      POSTGRES_USER: stratus
      POSTGRES_PASSWORD: stratus
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stratus -d stratus_lite"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/stratus_lite
      SPRING_DATASOURCE_USERNAME: stratus
      SPRING_DATASOURCE_PASSWORD: stratus
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres-data:
